spring.application.name=pulse-broker-api

# Database Configuration (Falls back to H2 for local dev)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/pulse-broker}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASS:}

# JPA / Hibernate Configuration
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Web Console (available at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Web / Server Configuration
server.port=8080
spring.web.cors.allowed-origins=*

# Security Configuration
pulse.security.master-secret=${MASTER_SECRET:PULSE99}
